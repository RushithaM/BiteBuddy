services:
  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: bitebuddy
      POSTGRES_PASSWORD: bitebuddy
      POSTGRES_DB: bitebuddy
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  pgdata:
